<!DOCTYPE html>
<html>

<head>

<title>Flight Board</title>

<meta http-equiv="refresh" content="5">

<style>

body{
background:#111;
color:white;
font-family:Arial;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #333;
text-align:left;
}

</style>

</head>

<body>

<h1>🚁 Helicopter Flight Board</h1>

<table>

<tr>
<th>Hora</th>
<th>Heli</th>
<th>Duração</th>
<th>Status</th>
</tr>

{% for voo in voos %}

<tr>

<td>{{ voo[3] }}</td>
<td>{{ voo[1] }}</td>
<td>{{ voo[4] }} min</td>
<td>{{ voo[5] }}</td>

</tr>

{% endfor %}

</table>

</body>

</html>p
